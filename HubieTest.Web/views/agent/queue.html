<!-- queue.html (AGENT) -->
<div class="page">
    <div class="page-head">
        <h2>Service queue</h2>
        <select ng-model="statusFilter" ng-change="load()">
            <option value="">All (not closed)</option>
            <option value="OPEN">Open</option>
            <option value="IN_PROGRESS">In progress</option>
            <option value="ANSWERED">Answered</option>
        </select>
    </div>

    <div class="card">
        <!-- Controller should initialize: $scope.tickets = []; $scope.loading = true/false -->
        <div ng-if="loading" class="muted">Loading…</div>

        <table class="grid" ng-if="!loading">
            <thead>
                <tr><th>#</th><th>Title</th><th>Category</th><th>Requester</th><th>Status</th><th></th></tr>
            </thead>
            <tbody>
                <tr ng-repeat="t in tickets track by t.TICKET_ID">
                    <td>{{ t.TICKET_ID }}</td>
                    <td>{{ t.TICKET_TITLE }}</td>
                    <td>{{ t.CATEGORY_NAME }}</td>
                    <td>{{ t.REQUESTER_NAME }}</td>
                    <td><span class="status">{{ t.TICKET_STATUS }}</span></td>
                    <td><button type="button" class="btn btn-link" ng-click="handle(t)" aria-label="Handle ticket {{t.TICKET_ID}}">handle</button></td>
                </tr>

                <tr ng-if="!tickets || !tickets.length">
                    <td colspan="6" class="muted">
                        No tickets in the queue.
                        <span ng-if="statusFilter"> (No tickets match the selected filter.)</span>
                        <span ng-if="!statusFilter"> Click refresh or change filter to see tickets.</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
